AutoName: Outspoke

Summary: On-device speech-to-text keyboard using Parakeet ASR

Description: |-
  Outspoke is a speech-to-text keyboard (IME) that transcribes your voice
  entirely on-device using the NVIDIA Parakeet ASR model via ONNX Runtime.

  No audio leaves the device. No account is required. No Google Play Services
  or any third-party telemetry libraries are used.

  The model file (~700 MB) is downloaded once over the internet and stored
  locally; the keyboard then works fully offline.

  Requires Android 13 (API 33) or higher.

AntiFeatures:
  NonFreeNet:
    # The app downloads the Parakeet ONNX model file from an external server
    # on first launch. After that, no network access is required.
    en-US: Downloads the ASR model file from an external server on first use.

