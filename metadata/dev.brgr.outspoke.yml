Categories:
  - Multimedia
  - Accessibility

License: GPL-3.0-only   # ← replace with your actual SPDX identifier

AuthorName: minburg
AuthorEmail:            # your email or leave blank
SourceCode: https://github.com/minburg/outspoke
IssueTracker: https://github.com/minburg/outspoke/issues
Changelog: https://github.com/minburg/outspoke/releases

AutoName: Outspoke

Summary: On-device speech-to-text keyboard using Parakeet ASR

Description: |-
  Outspoke is a speech-to-text keyboard (IME) that transcribes your voice
  entirely on-device using the NVIDIA Parakeet ASR model via ONNX Runtime.

  No audio leaves the device. No account is required. No Google Play Services
  or any third-party telemetry libraries are used.

  The model file (~700 MB) is downloaded once over the internet and stored
  locally; the keyboard then works fully offline.

  Requires Android 14 (API 34) or higher.

# ─── Anti-features ────────────────────────────────────────────────────────────
# Disclose every anti-feature — reviewers will reject if you miss one.
AntiFeatures:
  NonFreeNet:
    # The app downloads the Parakeet ONNX model file from an external server
    # on first launch. After that, no network access is required.
    en-US: Downloads the ASR model file from an external server on first use.

# ─── Build ────────────────────────────────────────────────────────────────────
Builds:
  - versionName: '0.1.0'
    versionCode: 1
    commit: v0.1.0
    subdir: app
    gradle:
      - release
    # Pin the exact Gradle / AGP / JDK versions so F-Droid's build server
    # produces a reproducible result. Update these when you bump versions.
    # F-Droid build server currently supports up to JDK 17.
    prebuild: |
      # Nothing required — pure Kotlin/Compose, no NDK, no generated assets.
    build: |
      # Default `gradle release` is sufficient; override here only if needed.

# ─── Auto-update ──────────────────────────────────────────────────────────────
# F-Droid will detect new releases from git tags matching this pattern
# and automatically open a PR to bump versionCode/versionName.
AutoUpdateMode: Version v%v
UpdateCheckMode: Tags
UpdateCheckData:
  # Tell the checker where versionCode lives in the repo
  - app/build.gradle.kts
  - versionCode\s*=\s*(\d+)
  - app/build.gradle.kts
  - versionName\s*=\s*"([^"]+)"

