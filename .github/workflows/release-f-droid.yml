# ─────────────────────────────────────────────────────────────────────────────
# Outspoke · Build, sign & publish to GitHub Releases
#
# HOW F-DROID PUBLISHING WORKS
# ─────────────────────────────────────────────────────────────────────────────
# F-Droid does NOT accept uploaded APKs. Their build server clones your repo,
# builds from source, and signs with the F-Droid key. This workflow handles
# the developer side:
#
#   1. On every push/PR  → CI job verifies the app still compiles (no signing).
#   2. On a version tag  → Release job builds a signed APK, generates a SHA-256
#                          checksum, and publishes a GitHub Release.
#
# The GitHub Release asset is the source of truth for two distribution paths:
#
#   A) IzzyOnDroid  (fastest – usually approved within days)
#      ➜ Submit once at https://apt.izzysoft.de/fdroid/index/submit
#        IzzyOnDroid auto-detects new releases from your GitHub Releases.
#
#   B) F-Droid main repo  (slower – reviewed by volunteers, ~2-8 weeks)
#      ➜ Submit a PR to https://gitlab.com/fdroid/fdroiddata
#        Use fastlane/metadata/android/ (already in this repo) for descriptions.
#        See metadata/dev.brgr.outspoke.yml for a starter fdroiddata entry.
#
# REQUIRED GITHUB SECRETS (Settings → Secrets → Actions)
# ─────────────────────────────────────────────────────────────────────────────
#   RELEASE_KEYSTORE_BASE64  – base64-encoded .jks keystore file
#                              Generate: keytool -genkey -v -keystore release.jks \
#                                          -alias outspoke -keyalg RSA -keysize 2048 \
#                                          -validity 10000
#                              Encode:   base64 -w 0 release.jks
#   KEY_ALIAS                – alias used when creating the keystore (e.g. outspoke)
#   KEY_PASSWORD             – private key password
#   STORE_PASSWORD           – keystore password
#
# TAGGING CONVENTION
# ─────────────────────────────────────────────────────────────────────────────
#   git tag v0.1.0 && git push origin v0.1.0
#   The tag must match versionName in app/build.gradle.kts (without the "v").
# ─────────────────────────────────────────────────────────────────────────────

name: Release (F-Droid / IzzyOnDroid)

on:
  push:
    branches: [ "main" ]
    tags:     [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # CI – verify the project compiles on every push and PR (no signing needed)
  # ───────────────────────────────────────────────────────────────────────────
  ci:
    name: Build (debug, no signing)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper checksum
        uses: gradle/actions/wrapper-validation@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Run unit tests
        run: ./gradlew test --no-daemon

  # ───────────────────────────────────────────────────────────────────────────
  # Release – build signed APK and publish a GitHub Release on version tags
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Build signed APK & publish GitHub Release
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # required to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for release notes generation

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper checksum
        uses: gradle/actions/wrapper-validation@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Strip the leading "v" from the tag to get the bare version string
      - name: Extract version name
        id: version
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Decode the base64 keystore secret back into a .jks file
      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      # Build the signed release APK by injecting signing params via Gradle properties.
      # The keystore file never touches the source tree.
      - name: Build signed release APK
        env:
          STORE_FILE:     ${{ runner.temp }}/release.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$STORE_FILE" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      # Rename to a human-readable filename that IzzyOnDroid / users can identify
      - name: Rename APK
        id: apk
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          APK_NAME="outspoke-${VERSION}.apk"
          mv app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          echo "filename=$APK_NAME" >> "$GITHUB_OUTPUT"

      # Generate a detached SHA-256 checksum so users can verify the download
      - name: Generate SHA-256 checksum
        run: |
          APK="${{ steps.apk.outputs.filename }}"
          sha256sum "$APK" > "${APK}.sha256"
          echo "SHA-256: $(cat ${APK}.sha256)"

      # Create the GitHub Release. softprops/action-gh-release auto-generates
      # release notes from commits since the previous tag.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Outspoke ${{ steps.version.outputs.name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # treat v0.1.0-beta as pre-release
          files: |
            ${{ steps.apk.outputs.filename }}
            ${{ steps.apk.outputs.filename }}.sha256

