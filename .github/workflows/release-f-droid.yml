name: Release (F-Droid / IzzyOnDroid)

on:
  push:
    branches: [ "main" ]
    tags:     [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci:
    name: Build (debug, no signing)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper checksum
        uses: gradle/actions/wrapper-validation@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Run unit tests
        run: ./gradlew test --no-daemon

  release:
    name: Build signed APK & publish GitHub Release
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # required to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for release notes generation

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper checksum
        uses: gradle/actions/wrapper-validation@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Strip the leading "v" from the tag to get the bare version string
      - name: Extract version name
        id: version
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Decode the base64 keystore secret back into a .jks file
      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      # Build the signed release APK by injecting signing params via Gradle properties.
      # The keystore file never touches the source tree.
      # -Pandroid.r8.suppressKotlinVersionCompatibilityCheck suppresses the harmless
      # "error occurred when parsing kotlin metadata" warning that R8 emits when the
      # project's Kotlin version is newer than the Kotlin version R8 was built against.
      - name: Build signed release APK
        env:
          STORE_FILE:     ${{ runner.temp }}/release.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$STORE_FILE" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            -Pandroid.r8.suppressKotlinVersionCompatibilityCheck=true

      # ABI splits produce one APK per architecture plus a universal APK, so there
      # is no plain app-release.apk.  Rename every generated APK to a versioned,
      # human-readable filename and generate a SHA-256 checksum alongside each one:
      #   app-universal-release.apk  → outspoke-<version>.apk
      #   app-arm64-v8a-release.apk  → outspoke-<version>-arm64-v8a.apk
      #   (same pattern for armeabi-v7a, x86, x86_64)
      - name: Rename APKs & generate checksums
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          echo "APKs produced by the build:"
          ls -lh app/build/outputs/apk/release/*.apk
          for APK in app/build/outputs/apk/release/app-*-release.apk; do
            SUFFIX=$(basename "$APK" | sed 's/app-\(.*\)-release\.apk/\1/')
            if [ "$SUFFIX" = "universal" ]; then
              DST="outspoke-${VERSION}.apk"
            else
              DST="outspoke-${VERSION}-${SUFFIX}.apk"
            fi
            mv "$APK" "$DST"
            sha256sum "$DST" > "${DST}.sha256"
            echo "SHA-256 ($DST): $(cat ${DST}.sha256)"
          done

      # Create the GitHub Release. softprops/action-gh-release auto-generates
      # release notes from commits since the previous tag.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Outspoke ${{ steps.version.outputs.name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # treat v0.1.0-beta as pre-release
          files: |
            outspoke-*.apk
            outspoke-*.apk.sha256

